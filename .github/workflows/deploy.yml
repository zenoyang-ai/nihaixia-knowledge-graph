name: Deploy to CloudBase (国内主站)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@3.6.4

      - name: Login to CloudBase (non-interactive, CAM API key)
        env:
          CLOUDBASE_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          CLOUDBASE_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
        run: tcb login --apiKeyId "$CLOUDBASE_SECRET_ID" --apiKey "$CLOUDBASE_SECRET_KEY"

      - name: Deploy docs/ to CloudBase static hosting
        run: tcb hosting deploy ./docs -e zeno-d9g0gdvw4a57635c0 --concurrency 20 --retry-count 3
